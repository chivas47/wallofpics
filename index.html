<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>The Wall</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Serif:ital@1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:      #08070a;
  --surface: #0f0e12;
  --fg:      #f0ede7;
  --dim:     #484250;
  --lime:    #c5f53a;
  --coral:   #ff4422;
  --gap:     3px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: "Space Mono", monospace;
  -webkit-font-smoothing: antialiased;
  min-height: 100svh;
}
button { font-family: inherit; cursor: pointer; }

/* ===================================================================
   GATE
=================================================================== */
.gate {
  position: fixed; inset: 0; z-index: 80;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 24px; text-align: center;
  background: var(--bg); overflow: hidden;
}
/* ambient glow */
.gate::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 45%, rgba(197,245,58,.07) 0%, transparent 70%),
    radial-gradient(ellipse 30% 25% at 75% 20%, rgba(255,68,34,.05) 0%, transparent 60%);
  pointer-events: none;
}
.gate.hide { display: none; }

.gate-eye {
  font-size: 10px; font-weight: 700;
  letter-spacing: .5em; text-transform: uppercase;
  color: var(--lime); margin-bottom: 32px; padding-left: .5em;
}
.gate-title {
  font-family: "Syne", sans-serif; font-weight: 800;
  font-size: clamp(88px, 20vw, 180px);
  line-height: .85; letter-spacing: -.04em;
  color: var(--fg); margin-bottom: 20px; position: relative;
}
.gate-title .accent { color: var(--lime); }
.gate-tagline {
  font-family: "Instrument Serif", serif; font-style: italic;
  font-size: clamp(17px, 3.5vw, 24px); color: var(--dim);
  margin-bottom: 52px; letter-spacing: .04em;
}
.gate-rule {
  width: 1px; height: 52px;
  background: linear-gradient(to bottom, var(--lime), transparent);
  margin: 0 auto 36px;
}
.gate-hint {
  font-size: 10px; letter-spacing: .4em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 14px; padding-left: .4em;
}
.gate form {
  display: flex; width: min(380px, 90vw);
  border: 1px solid rgba(197,245,58,.2); border-radius: 3px; overflow: hidden;
  background: rgba(255,255,255,.03);
}
.gate input {
  flex: 1; background: transparent; border: none;
  color: var(--fg); font-family: inherit; font-size: 22px;
  padding: 18px 20px; letter-spacing: .5em; text-align: center; outline: none;
}
.gate input::placeholder { color: var(--dim); letter-spacing: .2em; font-size: 16px; }
.gate input:focus { background: rgba(197,245,58,.04); }
.gate button[type=submit] {
  background: var(--lime); color: #06060a; border: none;
  font-weight: 700; font-size: 11px; padding: 0 26px;
  letter-spacing: .12em; text-transform: uppercase; flex-shrink: 0;
  transition: background .15s;
}
.gate button[type=submit]:hover { background: #d4ff4a; }
.gate .err {
  color: var(--coral); font-size: 11px; letter-spacing: .06em;
  margin-top: 18px; min-height: 14px;
}

/* ===================================================================
   HEADER
=================================================================== */
header {
  position: sticky; top: 0; z-index: 40; height: 50px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px;
  background: rgba(8,7,10,.82); backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(197,245,58,.07);
}
.h-brand { display: flex; align-items: baseline; gap: 10px; }
.h-title {
  font-family: "Syne", sans-serif; font-weight: 800;
  font-size: 16px; letter-spacing: .02em; text-transform: uppercase; color: var(--fg);
}
.h-title .accent { color: var(--lime); }
.h-sub {
  font-family: "Instrument Serif", serif; font-style: italic;
  font-size: 13px; color: var(--dim); letter-spacing: .02em;
}
.h-right { display: flex; align-items: center; gap: 12px; }
.count {
  font-size: 10px; letter-spacing: .1em;
  text-transform: uppercase; color: var(--dim);
}
.tbtn {
  background: transparent; color: var(--dim);
  border: 1px solid rgba(240,237,231,.1);
  border-radius: 2px; padding: 6px 12px;
  font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
  transition: color .2s, border-color .2s;
}
.tbtn:hover { color: var(--fg); border-color: rgba(240,237,231,.3); }
.tbtn.danger:hover { color: var(--coral); border-color: var(--coral); }
.tbtn:focus-visible { outline: 1px solid var(--lime); outline-offset: 2px; }

/* ===================================================================
   DROP ZONE
=================================================================== */
.drop {
  margin: var(--gap); padding: 24px 20px;
  border: 1px dashed rgba(197,245,58,.12); border-radius: 3px;
  text-align: center; color: var(--dim); font-size: 11px;
  line-height: 2; letter-spacing: .06em;
  transition: border-color .2s, background .2s;
}
.drop.empty { padding: 80px 20px; }
.drop strong { color: var(--fg); letter-spacing: .04em; }
.drop .or { display: block; margin: 8px 0 2px; }
.drop .picks {
  display: inline-flex; gap: 8px;
  flex-wrap: wrap; justify-content: center; margin-top: 6px;
}
.drop-ico {
  display: block; margin: 0 auto 16px; opacity: .35;
  width: 36px; height: 36px;
}
body.dragging .drop {
  border-color: var(--lime); background: rgba(197,245,58,.04);
}
body.dragging .drop strong { color: var(--lime); }

/* ===================================================================
   WALL — dense masonry, photos edge-to-edge
=================================================================== */
.wall {
  column-count: 2; column-gap: var(--gap);
  padding: var(--gap) var(--gap) 80px;
}
@media (min-width: 540px)  { .wall { column-count: 3; } }
@media (min-width: 800px)  { .wall { column-count: 4; } }
@media (min-width: 1100px) { .wall { column-count: 5; } }
@media (min-width: 1500px) { .wall { column-count: 6; } }
@media (min-width: 1900px) { .wall { column-count: 7; } }

figure {
  margin: 0 0 var(--gap); break-inside: avoid;
  position: relative; cursor: zoom-in;
  background: var(--surface); overflow: hidden; outline: none;
  opacity: 0; transform: translateY(16px) scale(.985);
  transition: opacity .55s ease, transform .55s ease;
}
figure.in { opacity: 1; transform: none; }

figure img {
  display: block; width: 100%; height: auto;
  transition: transform .6s cubic-bezier(.16,1,.3,1);
}
figure:hover img { transform: scale(1.06); }

/* lime shimmer overlay on hover */
figure::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(197,245,58,0);
  transition: background .35s; pointer-events: none;
}
figure:hover::after { background: rgba(197,245,58,.05); }

figure:focus-visible { box-shadow: 0 0 0 2px var(--lime) inset; }

.del {
  position: absolute; top: 7px; right: 7px;
  width: 22px; height: 22px; border-radius: 2px;
  background: rgba(8,7,10,.75); color: var(--coral);
  border: 1px solid rgba(255,68,34,.5);
  font-size: 12px; display: grid; place-items: center;
  opacity: 0; transition: opacity .2s, background .15s;
}
figure:hover .del, figure:focus-within .del { opacity: 1; }
.del:hover { background: var(--coral); color: #fff; border-color: var(--coral); }

/* ===================================================================
   LIGHTBOX
=================================================================== */
.lb {
  position: fixed; inset: 0; z-index: 60;
  background: rgba(5,4,7,.98); backdrop-filter: blur(18px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.lb.open { opacity: 1; pointer-events: auto; }
.lb img {
  max-width: 92vw; max-height: 88vh; object-fit: contain;
  box-shadow: 0 48px 120px rgba(0,0,0,.95);
  transform: scale(.94); transition: transform .38s cubic-bezier(.16,1,.3,1);
  touch-action: pan-y;
}
.lb.open img { transform: scale(1); }
.lb-bar {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px;
  font-size: 10px; color: var(--dim); letter-spacing: .12em; text-transform: uppercase;
}
.lb-btn {
  background: rgba(240,237,231,.06); color: var(--fg);
  border: 1px solid rgba(240,237,231,.1);
  border-radius: 2px; width: 42px; height: 42px;
  font-size: 18px; display: grid; place-items: center;
  transition: background .2s, border-color .2s;
}
.lb-btn:hover { background: rgba(197,245,58,.1); border-color: rgba(197,245,58,.35); }
.lb-btn:focus-visible { outline: 1px solid var(--lime); outline-offset: 2px; }
.lb-nav { position: absolute; top: 50%; transform: translateY(-50%); }
.lb-nav.prev { left: 18px; } .lb-nav.next { right: 18px; }
@media (max-width: 560px) {
  .lb-nav.prev { left: 8px; } .lb-nav.next { right: 8px; }
}

/* ===================================================================
   MUSIC
=================================================================== */
.music-fab {
  position: fixed;
  bottom: calc(20px + env(safe-area-inset-bottom));
  right: 20px; z-index: 70;
  display: flex; align-items: center; gap: 8px;
}
.music-bars {
  display: flex; align-items: flex-end; gap: 2px; height: 16px;
}
.music-bars span {
  display: block; width: 2px; height: 3px; border-radius: 1px;
  background: var(--lime);
}
.music-bars.on span:nth-child(1) { animation: ba .9s ease-in-out infinite; }
.music-bars.on span:nth-child(2) { animation: bb .7s ease-in-out .12s infinite; }
.music-bars.on span:nth-child(3) { animation: bc .8s ease-in-out .22s infinite; }
.music-bars.on span:nth-child(4) { animation: bd 1s  ease-in-out .06s infinite; }
@keyframes ba { 0%,100%{height:3px}  50%{height:14px} }
@keyframes bb { 0%,100%{height:9px}  50%{height:3px}  }
@keyframes bc { 0%,100%{height:12px} 50%{height:4px}  }
@keyframes bd { 0%,100%{height:5px}  50%{height:16px} }

.music-btn {
  width: 42px; height: 42px; border-radius: 2px;
  background: rgba(8,7,10,.9); backdrop-filter: blur(10px);
  border: 1px solid rgba(197,245,58,.25);
  color: var(--lime); font-size: 17px; display: grid; place-items: center;
  transition: background .2s, border-color .2s, transform .15s;
}
.music-btn:hover { background: rgba(197,245,58,.1); border-color: var(--lime); transform: scale(1.07); }
.music-btn:focus-visible { outline: 1px solid var(--lime); outline-offset: 3px; }

@media (prefers-reduced-motion: reduce) {
  figure { transition: opacity .01s; transform: none; }
  figure img, figure::after { transition: none; }
  .lb, .lb img { transition: none; }
  .music-bars.on span { animation: none !important; height: 8px !important; }
}
</style>
</head>
<body>

<!-- ── GATE ──────────────────────────────────────────────── -->
<div class="gate" id="gate">
  <p class="gate-eye">✦ Private Gallery ✦</p>
  <h1 class="gate-title">THE<br><span class="accent">WALL</span></h1>
  <p class="gate-tagline">Sabbatical Journey</p>
  <div class="gate-rule"></div>
  <p class="gate-hint">Passcode</p>
  <form id="gateForm" autocomplete="off">
    <input id="pass" type="password" inputmode="numeric"
           aria-label="Passcode" placeholder="· · · ·" />
    <button type="submit">Enter</button>
  </form>
  <div class="err" id="gateErr"></div>
</div>

<!-- ── HEADER ─────────────────────────────────────────────── -->
<header>
  <div class="h-brand">
    <span class="h-title">The <span class="accent">Wall</span></span>
    <span class="h-sub">Sabbatical Journey</span>
  </div>
  <div class="h-right">
    <span class="count" id="count" aria-live="polite"></span>
    <button class="tbtn danger" id="clearBtn" hidden>Clear all</button>
  </div>
</header>

<!-- ── DROP ZONE ──────────────────────────────────────────── -->
<div class="drop empty" id="drop">
  <svg class="drop-ico" viewBox="0 0 36 36" fill="none" stroke="currentColor"
       stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="8" width="32" height="22" rx="2"/>
    <path d="M12 8l2-4h8l2 4"/>
    <circle cx="18" cy="19" r="5"/>
    <circle cx="18" cy="19" r="2"/>
    <path d="M28 13h2"/>
  </svg>
  <strong>Drop photos here</strong> to pin them to the wall.
  <span class="or">or</span>
  <span class="picks">
    <button class="tbtn" id="pickFiles">Choose files</button>
    <button class="tbtn" id="pickFolder">Choose folder</button>
  </span>
  <input id="fileInput"   type="file" accept="image/*" multiple hidden />
  <input id="folderInput" type="file" accept="image/*" webkitdirectory multiple hidden />
</div>

<!-- ── WALL ───────────────────────────────────────────────── -->
<main class="wall" id="wall" aria-label="Photo gallery"></main>

<!-- ── LIGHTBOX ───────────────────────────────────────────── -->
<div class="lb" id="lb" role="dialog" aria-modal="true" aria-label="Photo viewer">
  <div class="lb-bar">
    <span id="lbCount"></span>
    <button class="lb-btn" id="lbClose" aria-label="Close">&times;</button>
  </div>
  <div class="lb-nav prev">
    <button class="lb-btn" id="lbPrev" aria-label="Previous photo">&#8249;</button>
  </div>
  <div class="lb-nav next">
    <button class="lb-btn" id="lbNext" aria-label="Next photo">&#8250;</button>
  </div>
  <img id="lbImg" alt="" />
</div>

<!-- ── MUSIC ──────────────────────────────────────────────── -->
<!--
  MUSIC SETUP: drop an audio file named  music.mp3  in the same
  folder as this HTML. Supported: .mp3  .ogg  .aac  .m4a
-->
<div class="music-fab" id="musicFab" hidden>
  <div class="music-bars" id="musicBars">
    <span></span><span></span><span></span><span></span>
  </div>
  <button class="music-btn" id="musicBtn" aria-label="Play music" title="Play / Pause">♫</button>
</div>
<audio id="bgMusic" loop preload="none">
  <source src="music.mp3" type="audio/mpeg" />
  <source src="music.ogg" type="audio/ogg" />
  <source src="music.aac" type="audio/aac" />
</audio>

<script>
/* =========================================================================
   CONFIG — change PASSCODE here.
   Note: browser devtools can bypass this. Use a server-side auth for real
   privacy (e.g. Cloudflare Access, Netlify Identity).
   ========================================================================= */
const PASSCODE = "1234";

/* =========================================================================
   GATE
   ========================================================================= */
const gate = document.getElementById("gate");

function unlock() {
  gate.classList.add("hide");
  boot();
  tryPlayMusic();
}

document.getElementById("gateForm").addEventListener("submit", (e) => {
  e.preventDefault();
  if (document.getElementById("pass").value === PASSCODE) {
    sessionStorage.setItem("wall_ok", "1");
    unlock();
  } else {
    document.getElementById("gateErr").textContent = "Incorrect. Try again.";
  }
});

/* =========================================================================
   STORAGE — IndexedDB, nothing leaves this device.
   ========================================================================= */
const DB_NAME = "wall_db", STORE = "photos";

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () =>
      req.result.createObjectStore(STORE, { keyPath: "id", autoIncrement: true });
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}
async function dbAll() {
  const d = await openDB();
  return new Promise((res, rej) => {
    const t = d.transaction(STORE).objectStore(STORE).getAll();
    t.onsuccess = () => res(t.result); t.onerror = () => rej(t.error);
  });
}
async function dbAdd(blob) {
  const d = await openDB();
  return new Promise((res, rej) => {
    const t = d.transaction(STORE, "readwrite").objectStore(STORE).add({ blob });
    t.onsuccess = () => res(t.result); t.onerror = () => rej(t.error);
  });
}
async function dbDel(id) {
  const d = await openDB();
  return new Promise((res, rej) => {
    const t = d.transaction(STORE, "readwrite").objectStore(STORE).delete(id);
    t.onsuccess = () => res(); t.onerror = () => rej(t.error);
  });
}
async function dbClear() {
  const d = await openDB();
  return new Promise((res, rej) => {
    const t = d.transaction(STORE, "readwrite").objectStore(STORE).clear();
    t.onsuccess = () => res(); t.onerror = () => rej(t.error);
  });
}

/* =========================================================================
   RENDER
   ========================================================================= */
const wall     = document.getElementById("wall");
const countEl  = document.getElementById("count");
const dropEl   = document.getElementById("drop");
const clearBtn = document.getElementById("clearBtn");
let items = [];

/* stagger reveal as photos scroll into view */
const io = new IntersectionObserver((entries) => {
  entries.forEach((e) => {
    if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
  });
}, { rootMargin: "160px" });

function tile(item) {
  const fig = document.createElement("figure");
  fig.tabIndex = 0;
  fig.setAttribute("role", "button");
  fig.setAttribute("aria-label", "Open photo " + (items.indexOf(item) + 1));

  const img = document.createElement("img");
  img.loading = "lazy";
  img.decoding = "async";
  img.src = item.url;
  img.alt = "";
  fig.appendChild(img);

  const del = document.createElement("button");
  del.className = "del";
  del.innerHTML = "&times;";
  del.setAttribute("aria-label", "Remove photo");
  del.addEventListener("click", (ev) => { ev.stopPropagation(); remove(item); });
  fig.appendChild(del);

  fig.addEventListener("click",   () => open(items.indexOf(item)));
  fig.addEventListener("keydown", (ev) => {
    if (ev.key === "Enter" || ev.key === " ") {
      ev.preventDefault(); open(items.indexOf(item));
    }
  });

  io.observe(fig);
  return fig;
}

function refreshChrome() {
  const n = items.length;
  countEl.textContent = n ? n + (n === 1 ? " photo" : " photos") : "";
  clearBtn.hidden = n === 0;
  dropEl.classList.toggle("empty", n === 0);
}

function renderAll() {
  wall.innerHTML = "";
  const frag = document.createDocumentFragment();
  items.forEach((it) => frag.appendChild(tile(it)));
  wall.appendChild(frag);
  refreshChrome();
}

/* =========================================================================
   IMPORT
   ========================================================================= */
function isImg(f) { return f && f.type && f.type.startsWith("image/"); }

async function addBlobs(blobs) {
  for (const b of blobs) {
    if (!isImg(b)) continue;
    const id   = await dbAdd(b);
    const item = { id, url: URL.createObjectURL(b) };
    items.push(item);
    wall.appendChild(tile(item));
  }
  refreshChrome();
}

function walkEntry(entry, out) {
  return new Promise((resolve) => {
    if (entry.isFile) {
      entry.file((f) => { if (isImg(f)) out.push(f); resolve(); });
    } else if (entry.isDirectory) {
      const reader = entry.createReader(), all = [];
      const read = () => reader.readEntries(async (es) => {
        if (!es.length) { for (const e of all) await walkEntry(e, out); resolve(); }
        else { all.push(...es); read(); }
      });
      read();
    } else resolve();
  });
}

const fileInput   = document.getElementById("fileInput");
const folderInput = document.getElementById("folderInput");
document.getElementById("pickFiles").onclick  = () => fileInput.click();
document.getElementById("pickFolder").onclick = () => folderInput.click();
fileInput.onchange   = () => { addBlobs([...fileInput.files]);   fileInput.value = ""; };
folderInput.onchange = () => { addBlobs([...folderInput.files]); folderInput.value = ""; };

let dc = 0;
window.addEventListener("dragenter", (e) => { e.preventDefault(); dc++; document.body.classList.add("dragging"); });
window.addEventListener("dragover",  (e) => e.preventDefault());
window.addEventListener("dragleave", (e) => { e.preventDefault(); if (--dc <= 0) document.body.classList.remove("dragging"); });
window.addEventListener("drop", async (e) => {
  e.preventDefault(); dc = 0; document.body.classList.remove("dragging");
  const dt = e.dataTransfer; if (!dt) return;
  const entries = [...(dt.items || [])].map((it) => it.webkitGetAsEntry && it.webkitGetAsEntry()).filter(Boolean);
  if (entries.length) {
    const out = [];
    for (const en of entries) await walkEntry(en, out);
    addBlobs(out);
  } else {
    addBlobs([...dt.files]);
  }
});

/* =========================================================================
   REMOVE / CLEAR
   ========================================================================= */
async function remove(item) {
  await dbDel(item.id);
  URL.revokeObjectURL(item.url);
  items = items.filter((x) => x !== item);
  renderAll();
}
clearBtn.onclick = async () => {
  if (!confirm("Remove all photos from this device?")) return;
  await dbClear();
  items.forEach((it) => URL.revokeObjectURL(it.url));
  items = [];
  renderAll();
};

/* =========================================================================
   LIGHTBOX
   ========================================================================= */
const lb      = document.getElementById("lb");
const lbImg   = document.getElementById("lbImg");
const lbCount = document.getElementById("lbCount");
let idx = 0;

function show() {
  lbImg.src = items[idx].url;
  lbCount.textContent = (idx + 1) + " / " + items.length;
}
function open(i)  { idx = i; show(); lb.classList.add("open"); document.body.style.overflow = "hidden"; document.getElementById("lbClose").focus(); }
function close()  { lb.classList.remove("open"); document.body.style.overflow = ""; }
function next()   { idx = (idx + 1) % items.length; show(); }
function prev()   { idx = (idx - 1 + items.length) % items.length; show(); }

document.getElementById("lbClose").onclick = close;
document.getElementById("lbNext").onclick  = next;
document.getElementById("lbPrev").onclick  = prev;
lb.addEventListener("click", (e) => { if (e.target === lb) close(); });
document.addEventListener("keydown", (e) => {
  if (!lb.classList.contains("open")) return;
  if (e.key === "Escape")      close();
  else if (e.key === "ArrowRight") next();
  else if (e.key === "ArrowLeft")  prev();
});

let sx = 0;
lb.addEventListener("touchstart", (e) => sx = e.touches[0].clientX, { passive: true });
lb.addEventListener("touchend",   (e) => {
  const dx = e.changedTouches[0].clientX - sx;
  if (Math.abs(dx) > 50) dx < 0 ? next() : prev();
}, { passive: true });

/* =========================================================================
   MUSIC
   ========================================================================= */
const audio      = document.getElementById("bgMusic");
const musicFab   = document.getElementById("musicFab");
const musicBtn   = document.getElementById("musicBtn");
const musicBars  = document.getElementById("musicBars");
let isPlaying = false;

function setPlaying(on) {
  isPlaying = on;
  musicBtn.innerHTML = on ? "⏸" : "♫";
  musicBtn.setAttribute("aria-label", on ? "Pause music" : "Play music");
  musicBars.classList.toggle("on", on);
}

musicBtn.addEventListener("click", () => {
  if (isPlaying) { audio.pause(); }
  else { audio.volume = 0.35; audio.play().catch(() => {}); }
});
audio.addEventListener("play",  () => setPlaying(true));
audio.addEventListener("pause", () => setPlaying(false));
audio.addEventListener("ended", () => setPlaying(false));

function tryPlayMusic() {
  musicFab.hidden = false;
  audio.volume = 0.35;
  audio.play()
    .then(() => setPlaying(true))
    .catch(() => setPlaying(false));
}

/* =========================================================================
   BOOT
   ========================================================================= */
async function boot() {
  try {
    const rows = (await dbAll()).sort((a, b) => a.id - b.id);
    items = rows.map((r) => ({ id: r.id, url: URL.createObjectURL(r.blob) }));
    renderAll();
  } catch (err) {
    renderAll();
    console.warn("IndexedDB unavailable:", err);
  }
}

if (sessionStorage.getItem("wall_ok") === "1") unlock();
</script>
